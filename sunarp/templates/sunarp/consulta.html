{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta SUNARP - TSIRSARP</title>
    <link rel="stylesheet" href="{% static 'sunarp/css/estilos.css' %}">
</head>
<body>
    <h1>Consulta SUNARP - TSIRSARP</h1>

    <div class="form-container">
        <form id="consultaForm">
            <div class="form-group">
                <label for="tipo_participante">Tipo de Persona:</label>
                <select id="tipo_participante" name="tipo_participante" required>
                    <option value="N">Persona Natural</option>
                    <option value="J">Persona Jurídica</option>
                </select>
            </div>

            <div id="personaNaturalFields">
                <div class="row">
                    <div class="col form-group">
                        <label for="apellido_paterno">Apellido Paterno:</label>
                        <input type="text" id="apellido_paterno" name="apellido_paterno" placeholder="Ej: CASTILLO">
                    </div>
                    <div class="col form-group">
                        <label for="apellido_materno">Apellido Materno:</label>
                        <input type="text" id="apellido_materno" name="apellido_materno" placeholder="Ej: ROBLES">
                    </div>
                </div>
                <div class="form-group">
                    <label for="nombres">Nombres:</label>
                    <input type="text" id="nombres" name="nombres" placeholder="Ej: TADEO">
                </div>
            </div>

            <div id="personaJuridicaFields" style="display: none;">
                <div class="form-group">
                    <label for="razon_social">Razón Social:</label>
                    <input type="text" id="razon_social" name="razon_social" placeholder="Ej: EMPRESA SAC">
                </div>
            </div>

            <button type="submit" id="btnConsultar">
                Consultar
            </button>
        </form>
    </div>

    <div id="resultado" class="resultado">
        <h3 id="resultadoTitulo"></h3>
        <div id="resultadoContenido"></div>
    </div>

    <script src="{% static 'sunarp/js/funcionalida.js' %}"></script>
</body>
</html>
