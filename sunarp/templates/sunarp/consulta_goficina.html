{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta SUNARP - GOFICINA</title>
    <link rel="stylesheet" href="{% static 'sunarp/css/estilos.css' %}">
</head>
<body>
    <h1>Consulta SUNARP - GOFICINA</h1>
    <p class="subtitle">Listar Oficinas Registrales</p>

    <div class="form-container">
        <form id="consultaForm">
            <p class="help-text">Esta consulta utiliza las credenciales configuradas en el sistema.</p>

            <button type="submit" id="btnConsultar">
                Consultar Oficinas
            </button>
        </form>
    </div>

    <div id="resultado" class="resultado">
        <h3 id="resultadoTitulo"></h3>
        <div id="resultadoContenido"></div>
    </div>

    <script src="{% static 'sunarp/js/goficina.js' %}"></script>
</body>
</html>
