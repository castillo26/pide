{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consulta SUNARP - VASIRSARP</title>
    <link rel="stylesheet" href="{% static 'sunarp/css/estilos.css' %}">
</head>
<body>
    <div class="header-bar">
        <h1>Consulta SUNARP - VASIRSARP</h1>
        <a href="{% url 'dashboard' %}" class="btn-back">Volver al Dashboard</a>
    </div>
    <p class="subtitle">Visualizar Asiento Registral - Imagen</p>

    <div class="form-container">
        <form id="consultaForm">
            <div class="form-group">
                <label for="transaccion">Transacción:</label>
                <input type="text" id="transaccion" name="transaccion" placeholder="Ej: 0104P18029101210000018" required>
                <small class="help-text">Obtenido del método LASIRSARP</small>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="idImg">ID Imagen:</label>
                    <input type="text" id="idImg" name="idImg" placeholder="Ej: 0" required>
                </div>
                <div class="col form-group">
                    <label for="tipo">Tipo:</label>
                    <input type="text" id="tipo" name="tipo" placeholder="Ej: ASIENTO" required>
                </div>
            </div>

            <div class="row">
                <div class="col form-group">
                    <label for="nroTotalPag">Número Total de Páginas:</label>
                    <input type="text" id="nroTotalPag" name="nroTotalPag" placeholder="Ej: 4" required>
                </div>
                <div class="col form-group">
                    <label for="nroPagRef">Número de Página de Referencia:</label>
                    <input type="text" id="nroPagRef" name="nroPagRef" placeholder="Ej: 1" required>
                </div>
            </div>

            <button type="submit" id="btnConsultar">
                Ver todas las imágenes
            </button>
            <p class="help-text" style="text-align:center;margin-top:10px;font-size:13px;color:#888;">
                Se cargarán automáticamente todas las páginas (1 a N) con 2 segundos de espera entre cada consulta.
            </p>
        </form>
    </div>

    <div id="resultado" class="resultado">
        <h3 id="resultadoTitulo"></h3>
        <div id="resultadoContenido"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="{% static 'sunarp/js/vasirsarp.js' %}"></script>
</body>
</html>
